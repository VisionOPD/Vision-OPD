defaults:
  - _self_

vars:
  dir: ./data
  log_dir: ./output
  ckpt_dir: ./checkpoints

data:
  train_files: ["${vars.dir}/train.parquet"]
  val_files: []
  filter_overlong_prompts: True
  max_prompt_length: 8192
  max_response_length: 1024
  shuffle: True
  trust_remote_code: True

actor_rollout_ref:
  actor:
    ppo_micro_batch_size_per_gpu: 1
    clip_ratio_high: 0.28
    use_kl_loss: False
  model:
    path: Qwen/Qwen3.5-4B
    trust_remote_code: True
  ref:
    log_prob_micro_batch_size_per_gpu: 1
  rollout:
    name: vllm
    gpu_memory_utilization: 0.7
    log_prob_micro_batch_size_per_gpu: 1

algorithm:
  use_kl_in_reward: False

custom_reward_function:
  path: null

critic:
  model:
    path: Qwen/Qwen3.5-4B

reward_model:
  enable: False
  use_reward_loop: False

trainer:
  project_name: Vision-OPD
  group_name: Vision-OPD
  experiment_name: Vision-OPD
  n_gpus_per_node: 8
  nnodes: 1
  save_freq: 5
  test_freq: -1
  max_actor_ckpt_to_keep: null
  total_epochs: 4
  val_before_train: False
  default_local_dir: ${vars.ckpt_dir}/${trainer.experiment_name}
