defaults:
  - ppo_trainer
  - user
  - _self_

max_model_len: 18944

actor_rollout_ref:
  actor:
    ppo_mini_batch_size: 32
    policy_loss:
      loss_mode: vopd
    self_distillation:
      max_reprompt_len: 10240
      is_clip: 2.0
      teacher_always_on: True
      teacher_prompt_mode: answer_hint
    optim:
      lr: 1e-5
  rollout:
    n: 8
    calculate_log_probs: True

algorithm:
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: False
  rollout_correction:
    rollout_is: token
    rollout_is_threshold: 2.0

data:
  train_batch_size: 32

trainer:
  val_before_train: False
